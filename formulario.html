<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário WhatsApp</title>
    
    <!-- FAVICON ADICIONADO -->
    <link rel="icon" type="image/png" href="https://www.adventistas.org/pt/wp-content/themes/pa-theme-sedes/assets/imgs/favicon.png">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { margin: 15px 0; }
        .checkbox-item { margin-bottom: 8px; display: flex; align-items: center; }
        .checkbox-item input { margin-right: 10px; }

        /* Estilo da caixa de texto condicional oculta por padrão */
        .campo-extra-container { display: none; margin-top: 10px; margin-bottom: 15px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; height: 80px; resize: none; font-family: Arial, sans-serif; }
        .contador-caracteres { font-size: 11px; color: #777; text-align: right; margin-top: 2px; }

        /* Estilo do link em formato de botão puro */
        .btn-enviar {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            background-color: #25D366;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
            transition: background 0.3s;
        }
        .btn-enviar.disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Solicitação</h2>
    <form id="meuFormulario" autocomplete="off" onsubmit="return false;">
        <div class="input-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="input-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" maxlength="15" placeholder="(99) 99999-9999">
        </div>

        <div class="checkbox-group">
            <label>Escolha as opções:</label>
            <div class="checkbox-item">
                <input type="checkbox" name="opcoes" value="Opção A" class="opcao-check"> Gostaria de receber uma visita em minha casa.
            </div>
            <div class="checkbox-item">
                <input type="checkbox" name="opcoes" value="Opção B" class="opcao-check"> Gostaria de conversar por telefone.
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="opcaoTres" name="opcoes" value="Opção C" class="opcao-check"> Gostaria que orassem por:
            </div>
        </div>

        <!-- Área oculta da Caixa de Texto Condicional -->
        <div id="containerOpcaoTres" class="campo-extra-container">
            <label for="detalhesOpcaoTres">Motivo da oração:</label>
            <textarea id="detalhesOpcaoTres" maxlength="140" placeholder="Digite mais informações aqui... (máx 140 caracteres)"></textarea>
            <div id="contador" class="contador-caracteres">140 caracteres restantes</div>
        </div>

        <!-- Botão baseado em Link Nativo HTML -->
        <a href="#" id="btnEnviar" class="btn-enviar disabled" target="_blank">Enviar para o WhatsApp</a>
    </form>
</div>

<script>
    const NUMERO_WHATSAPP = "5511971351712";

    const nomeInput = document.getElementById('nome');
    const telefoneInput = document.getElementById('telefone');
    const checkboxes = document.querySelectorAll('.opcao-check');
    const opcaoTresCheckbox = document.getElementById('opcaoTres');
    const containerOpcaoTres = document.getElementById('containerOpcaoTres');
    const detalhesOpcaoTres = document.getElementById('detalhesOpcaoTres');
    const contadorVisor = document.getElementById('contador');
    const btnEnviar = document.getElementById('btnEnviar');

    function gerenciarOpçaoTres() {
        if (opcaoTresCheckbox.checked) {
            containerOpcaoTres.style.display = 'block';
            detalhesOpcaoTres.setAttribute('required', 'true');
        } else {
            containerOpcaoTres.style.display = 'none';
            detalhesOpcaoTres.removeAttribute('required');
            detalhesOpcaoTres.value = ''; 
            contadorVisor.textContent = '140 caracteres restantes';
        }
    }

    detalhesOpcaoTres.addEventListener('input', function() {
        const quantidadeRestante = 140 - detalhesOpcaoTres.value.length;
        contadorVisor.textContent = quantidadeRestante + ' caracteres restantes';
        atualizarLinkMensagem();
    });

    function aplicarMascaraTelefone(evento) {
        let valor = evento.target.value.replace(/\D/g, "");
        if (valor.length > 0) valor = "(" + valor;
        if (valor.length > 3) valor = valor.slice(0, 3) + ") " + valor.slice(3);
        if (valor.length > 10) valor = valor.slice(0, 10) + "-" + valor.slice(10);
        evento.target.value = valor.slice(0, 15);
        atualizarLinkMensagem();
    }

    function atualizarLinkMensagem() {
        const nomePreenchido = nomeInput.value.trim() !== "";
        const telefoneValido = telefoneInput.value.trim().length >= 14;
        const algumCheckboxMarcado = Array.from(checkboxes).some(cb => cb.checked);

        let detalheValidado = true;
        if (opcaoTresCheckbox.checked) {
            detalheValidado = detalhesOpcaoTres.value.trim() !== "";
        }

        if (nomePreenchido && telefoneValido && algumCheckboxMarcado && detalheValidado) {
            const opcoesMarcadas = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.value)
                .join(', ');

            let textoMensagem = `*Novo Cadastro*\n\n`;
            textoMensagem += `*Nome:* ${nomeInput.value.trim()}\n`;
            textoMensagem += `*Telefone:* ${telefoneInput.value.trim()}\n`;
            textoMensagem += `*Opção selecionada:* ${opcoesMarcadas}`;

            if (opcaoTresCheckbox.checked && detalhesOpcaoTres.value.trim() !== "") {
                textoMensagem += `\n*Motivo da oração:* ${detalhesOpcaoTres.value.trim()}`;
            }

            const textoCodificado = encodeURIComponent(textoMensagem);
            
            btnEnviar.href = "https://whatsapp.com" + NUMERO_WHATSAPP + "&text=" + textoCodificado;
            btnEnviar.classList.remove('disabled');
        } else {
            btnEnviar.href = "#";
            btnEnviar.classList.add('disabled');
        }
    }

    nomeInput.addEventListener('input', atualizarLinkMensagem);
    telefoneInput.addEventListener('input', aplicarMascaraTelefone);

    checkboxes.forEach(cb => {
        cb.addEventListener('change', function() {
            if (this.checked) {
                checkboxes.forEach(outraCaixa => {
                    if (outraCaixa !== this) {
                        outraCaixa.checked = false;
                    }
                });
            }
            
            gerenciarOpçaoTres();
            atualizarLinkMensagem();
        });
    });
</script>

</body>
</html>
